<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" width="100%" height="100%" aria-label="Mission Control Panel">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="{colors.bg_start}" />
      <stop offset="100%" stop-color="{colors.bg_end}" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .font-sans {{
      font-family: {typography.font_family};
    }}
    @keyframes barFill {{
      0% {{ width: 0%; }}
      100% {{ width: 100%; }}
    }}
    .progress-fill {{
      animation: barFill 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }}
  </style>

  <!-- Container -->
  <rect width="800" height="180" fill="url(#bgGrad)" stroke="{colors.border}" stroke-width="1.5" rx="8" />

  <!-- Section Header -->
  <g class="font-sans" transform="translate(24, 28)">
    <circle cx="6" cy="-4" r="4" fill="{colors.accent}" filter="url(#glow)" />
    <text x="18" y="0" font-size="10" font-weight="700" fill="{colors.text_muted}" letter-spacing="2">02 / CORE MISSION CONTROL</text>
    <line x1="-8" y1="12" x2="760" y2="12" stroke="{colors.border}" stroke-width="1" />
  </g>

  <!-- Projects Progress Grid -->
  <g class="font-sans" transform="translate(24, 64)">
    
    <!-- Item 1: THE WILL -->
    <g transform="translate(0, 0)">
      <text x="0" y="10" font-size="12" font-weight="700" fill="{colors.text_primary}">THE WILL</text>
      <text x="0" y="24" font-size="10" fill="{colors.text_muted}">AAA Horror Game AI Engine</text>
      <text x="220" y="10" font-size="11" font-weight="700" fill="{colors.red}" text-anchor="end">75%</text>
      <text x="220" y="24" font-size="9" font-weight="700" fill="{colors.red}" text-anchor="end">ACTIVE</text>
      <!-- Progress Bar -->
      <rect x="0" y="32" width="220" height="4" fill="{colors.card_bg}" stroke="{colors.border}" stroke-width="1" rx="2" />
      <rect x="0" y="32" width="165" height="4" fill="{colors.red}" rx="2" />
    </g>

    <!-- Item 2: ArcaneSpire -->
    <g transform="translate(266, 0)">
      <text x="0" y="10" font-size="12" font-weight="700" fill="{colors.text_primary}">ArcaneSpire</text>
      <text x="0" y="24" font-size="10" fill="{colors.text_muted}">Java OOP Game Framework</text>
      <text x="220" y="10" font-size="11" font-weight="700" fill="{colors.green}" text-anchor="end">100%</text>
      <text x="220" y="24" font-size="9" font-weight="700" fill="{colors.green}" text-anchor="end">STABLE</text>
      <!-- Progress Bar -->
      <rect x="0" y="32" width="220" height="4" fill="{colors.card_bg}" stroke="{colors.border}" stroke-width="1" rx="2" />
      <rect x="0" y="32" width="220" height="4" fill="{colors.green}" rx="2" />
    </g>

    <!-- Item 3: AlgoritmalarProje -->
    <g transform="translate(532, 0)">
      <text x="0" y="10" font-size="12" font-weight="700" fill="{colors.text_primary}">AlgoritmalarProje</text>
      <text x="0" y="24" font-size="10" fill="{colors.text_muted}">Bioinformatics / Vis System</text>
      <text x="220" y="10" font-size="11" font-weight="700" fill="{colors.yellow}" text-anchor="end">85%</text>
      <text x="220" y="24" font-size="9" font-weight="700" fill="{colors.yellow}" text-anchor="end">ACTIVE</text>
      <!-- Progress Bar -->
      <rect x="0" y="32" width="220" height="4" fill="{colors.card_bg}" stroke="{colors.border}" stroke-width="1" rx="2" />
      <rect x="0" y="32" width="187" height="4" fill="{colors.yellow}" rx="2" />
    </g>

    <!-- System Health Status Bar at Bottom -->
    <g transform="translate(0, 72)">
      <text x="0" y="10" font-size="10" font-weight="700" fill="{colors.text_muted}" letter-spacing="1">OS INTEGRITY HEALTH GAUGE</text>
      <text x="752" y="10" font-size="11" font-weight="700" fill="{colors.accent}" text-anchor="end">100% SECURE</text>
      <rect x="0" y="18" width="752" height="6" fill="{colors.card_bg}" stroke="{colors.border}" stroke-width="1" rx="3" />
      <rect x="0" y="18" width="752" height="6" fill="{colors.accent}" rx="3" filter="url(#glow)" />
    </g>
  </g>
</svg>
