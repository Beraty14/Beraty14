<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="100%" aria-label="Projects Specification Grid">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="{colors.bg_start}" />
      <stop offset="100%" stop-color="{colors.bg_end}" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .font-sans {
      font-family: {typography.font_family};
    }
  </style>

  <!-- Container -->
  <rect width="800" height="240" fill="url(#bgGrad)" stroke="{colors.border}" stroke-width="1.5" rx="8" />

  <!-- Section Header -->
  <g class="font-sans" transform="translate(24, 28)">
    <circle cx="6" cy="-4" r="4" fill="{colors.accent}" filter="url(#glow)" />
    <text x="18" y="0" font-size="10" font-weight="700" fill="{colors.text_muted}" letter-spacing="2">04 / DETAILED REPOSITORY ARTIFACTS</text>
    <line x1="-8" y1="12" x2="760" y2="12" stroke="{colors.border}" stroke-width="1" />
  </g>

  <!-- 2x2 Grid of Projects -->
  <g class="font-sans" transform="translate(24, 56)">
    
    <!-- Row 1, Col 1 -->
    <g transform="translate(0, 0)">
      <!-- Card background -->
      <rect width="364" height="68" fill="{colors.card_bg}" stroke="{colors.border}" stroke-width="1.2" rx="6" />
      <text x="16" y="22" font-size="13" font-weight="700" fill="{colors.text_primary}">{projects[0].title}</text>
      <text x="16" y="38" font-size="9" fill="{colors.text_muted}">{projects[0].subtitle}</text>
      
      <!-- Tech specs -->
      <text x="16" y="52" font-size="9.5" fill="{colors.accent}" font-weight="600">Arch: {projects[0].architecture}</text>
      <text x="210" y="52" font-size="9.5" fill="{projects[0].accent_color}" font-weight="600">AI: {projects[0].ai_integration}</text>
      <text x="270" y="52" font-size="9.5" fill="{colors.yellow}" font-weight="600">Diff: ★★★★★</text>
      <text x="348" y="24" font-size="9" font-weight="700" fill="{projects[0].accent_color}" text-anchor="end">● {projects[0].status}</text>
    </g>

    <!-- Row 1, Col 2 -->
    <g transform="translate(388, 0)">
      <rect width="364" height="68" fill="{colors.card_bg}" stroke="{colors.border}" stroke-width="1.2" rx="6" />
      <text x="16" y="22" font-size="13" font-weight="700" fill="{colors.text_primary}">{projects[1].title}</text>
      <text x="16" y="38" font-size="9" fill="{colors.text_muted}">{projects[1].subtitle}</text>
      
      <text x="16" y="52" font-size="9.5" fill="{colors.accent}" font-weight="600">Arch: {projects[1].architecture}</text>
      <text x="210" y="52" font-size="9.5" fill="{colors.text_muted}" font-weight="600">AI: {projects[1].ai_integration}</text>
      <text x="270" y="52" font-size="9.5" fill="{colors.yellow}" font-weight="600">Diff: ★★★★☆</text>
      <text x="348" y="24" font-size="9" font-weight="700" fill="{projects[1].accent_color}" text-anchor="end">● {projects[1].status}</text>
    </g>

    <!-- Row 2, Col 1 -->
    <g transform="translate(0, 84)">
      <rect width="364" height="68" fill="{colors.card_bg}" stroke="{colors.border}" stroke-width="1.2" rx="6" />
      <text x="16" y="22" font-size="13" font-weight="700" fill="{colors.text_primary}">{projects[2].title}</text>
      <text x="16" y="38" font-size="9" fill="{colors.text_muted}">{projects[2].subtitle}</text>
      
      <text x="16" y="52" font-size="9.5" fill="{colors.accent}" font-weight="600">Arch: {projects[2].architecture}</text>
      <text x="210" y="52" font-size="9.5" fill="{projects[2].accent_color}" font-weight="600">AI: {projects[2].ai_integration}</text>
      <text x="270" y="52" font-size="9.5" fill="{colors.yellow}" font-weight="600">Diff: ★★★★☆</text>
      <text x="348" y="24" font-size="9" font-weight="700" fill="{projects[2].accent_color}" text-anchor="end">● {projects[2].status}</text>
    </g>

    <!-- Row 2, Col 2 -->
    <g transform="translate(388, 84)">
      <rect width="364" height="68" fill="{colors.card_bg}" stroke="{colors.border}" stroke-width="1.2" rx="6" />
      <text x="16" y="22" font-size="13" font-weight="700" fill="{colors.text_primary}">{projects[3].title}</text>
      <text x="16" y="38" font-size="9" fill="{colors.text_muted}">{projects[3].subtitle}</text>
      
      <text x="16" y="52" font-size="9.5" fill="{colors.accent}" font-weight="600">Arch: {projects[3].architecture}</text>
      <text x="210" y="52" font-size="9.5" fill="{colors.text_muted}" font-weight="600">AI: {projects[3].ai_integration}</text>
      <text x="270" y="52" font-size="9.5" fill="{colors.yellow}" font-weight="600">Diff: ★★★☆☆</text>
      <text x="348" y="24" font-size="9" font-weight="700" fill="{projects[3].accent_color}" text-anchor="end">● {projects[3].status}</text>
    </g>

  </g>
</svg>
