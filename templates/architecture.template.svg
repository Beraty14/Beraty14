<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="100%" height="100%" aria-label="Systems Radial Architecture Constellation">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="{colors.bg_start}" />
      <stop offset="100%" stop-color="{colors.bg_end}" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .font-mono {
      font-family: 'Courier New', Courier, monospace, system-ui;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }
    @keyframes rotateCore {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .pulse-node {
      animation: pulse 3s infinite ease-in-out;
    }
    .core-ring {
      transform-origin: 400px 150px;
      animation: rotateCore 12s infinite linear;
    }
    .grid-line {
      stroke: {colors.border};
      stroke-width: 0.5;
      stroke-dasharray: 2, 8;
    }
  </style>

  <!-- Chassis Background -->
  <rect width="800" height="260" fill="url(#bgGrad)" stroke="{colors.border}" stroke-width="1.5" rx="8" />

  <!-- Technical grid backing -->
  <line x1="400" y1="0" x2="400" y2="260" class="grid-line" />
  <line x1="0" y1="150" x2="800" y2="150" class="grid-line" />
  <circle cx="400" cy="150" r="100" fill="none" stroke="{colors.border}" stroke-width="0.5" stroke-dasharray="4, 12" />
  <circle cx="400" cy="150" r="160" fill="none" stroke="{colors.border}" stroke-width="0.5" stroke-dasharray="4, 12" />

  <!-- Section Header (Prefix stripped) -->
  <g class="font-mono" transform="translate(24, 28)">
    <circle cx="6" cy="-4" r="4" fill="{colors.accent}" filter="url(#glow)" />
    <text x="18" y="0" font-size="10" font-weight="700" fill="{colors.text_muted}" letter-spacing="2">ACTIVE SYSTEMS &amp; COGNITIVE PIPELINE</text>
    <line x1="-8" y1="12" x2="760" y2="12" stroke="{colors.border}" stroke-width="1" />
  </g>

  <!-- Circuit Connector Lines (Hexagonal Constellation) - Shifted Y+20 -->
  <g stroke="{colors.border}" stroke-width="1" fill="none" opacity="0.6">
    <line x1="200" y1="90" x2="400" y2="150" />
    <line x1="200" y1="210" x2="400" y2="150" />
    
    <line x1="400" y1="60" x2="400" y2="150" />
    <line x1="400" y1="240" x2="400" y2="150" />
    
    <line x1="600" y1="90" x2="400" y2="150" />
    <line x1="600" y1="210" x2="400" y2="150" />
  </g>

  <!-- Flowing data packets (animated circles along paths) -->
  <g fill="none">
    <circle r="3" fill="{colors.accent}" filter="url(#glow)">
      <animateMotion dur="2s" repeatCount="indefinite" path="M 200 90 L 400 150" />
    </circle>
    <circle r="2.5" fill="{colors.green}">
      <animateMotion dur="2.5s" repeatCount="indefinite" path="M 200 210 L 400 150" />
    </circle>
    <circle r="3" fill="{colors.accent}" filter="url(#glow)">
      <animateMotion dur="1.8s" repeatCount="indefinite" path="M 400 150 L 600 90" />
    </circle>
    <circle r="2.5" fill="{colors.green}">
      <animateMotion dur="2.2s" repeatCount="indefinite" path="M 400 150 L 600 210" />
    </circle>
  </g>

  <!-- 1. CENTRAL PROCESSING CORE (ML Engine) -->
  <g transform="translate(0, 0)">
    <!-- Concentric core target -->
    <circle cx="400" cy="150" r="28" fill="{colors.card_bg}" stroke="{colors.accent}" stroke-width="1.2" />
    <circle cx="400" cy="150" r="22" fill="none" stroke="{colors.accent}" stroke-width="0.8" stroke-dasharray="3, 3" class="core-ring" />
    <circle cx="400" cy="150" r="6" fill="{colors.accent}" filter="url(#glow)" class="pulse-node" />
    
    <!-- Central status label -->
    <g class="font-mono" font-size="7" font-weight="700" text-anchor="middle" fill="{colors.text_primary}">
      <text x="400" y="106">COGNITIVE CORE</text>
      <text x="400" y="204" fill="{colors.accent}">CUDA COMPUTE</text>
    </g>
  </g>

  <!-- 2. SATELLITE NODES -->
  
  <!-- Node A: Ingest Bio (Left Top) -->
  <g transform="translate(200, 90)" class="font-mono" text-anchor="end">
    <circle cx="0" cy="0" r="5" fill="{colors.accent}" filter="url(#glow)" />
    <text x="-12" y="3" font-size="9" font-weight="700" fill="{colors.text_primary}">INGEST_BIO</text>
    <text x="-12" y="11" font-size="6" fill="{colors.text_muted}">FASTA Seq Data</text>
  </g>

  <!-- Node B: Ingest RAG (Left Bottom) -->
  <g transform="translate(200, 210)" class="font-mono" text-anchor="end">
    <circle cx="0" cy="0" r="5" fill="{colors.green}" />
    <text x="-12" y="3" font-size="9" font-weight="700" fill="{colors.text_primary}">INGEST_RAG</text>
    <text x="-12" y="11" font-size="6" fill="{colors.text_muted}">Search Log Streams</text>
  </g>

  <!-- Node C: PyTorch Core (Center Top) -->
  <g transform="translate(400, 60)" class="font-mono" text-anchor="middle">
    <circle cx="0" cy="0" r="5" fill="{colors.accent}" />
    <text x="0" y="-10" font-size="9" font-weight="700" fill="{colors.accent}">PYTORCH_ML</text>
    <text x="0" y="-18" font-size="6" fill="{colors.text_muted}">Transformer Inference</text>
  </g>

  <!-- Node D: PGVector DB (Right Top) -->
  <g transform="translate(600, 90)" class="font-mono" text-anchor="start">
    <circle cx="0" cy="0" r="5" fill="{colors.accent}" filter="url(#glow)" />
    <text x="12" y="3" font-size="9" font-weight="700" fill="{colors.text_primary}">PGVECTOR_DB</text>
    <text x="12" y="11" font-size="6" fill="{colors.text_muted}">Embeddings Vector Store</text>
  </g>

  <!-- Node E: REST Gateway (Right Bottom) -->
  <g transform="translate(600, 210)" class="font-mono" text-anchor="start">
    <circle cx="0" cy="0" r="5" fill="{colors.green}" />
    <text x="12" y="3" font-size="9" font-weight="700" fill="{colors.text_primary}">REST_GATEWAY</text>
    <text x="12" y="11" font-size="6" fill="{colors.text_muted}">JSON Serialization API</text>
  </g>

  <!-- Node F: LLM Inference (Center Bottom) -->
  <g transform="translate(400, 240)" class="font-mono" text-anchor="middle">
    <circle cx="0" cy="0" r="5" fill="{colors.accent}" />
    <text x="0" y="15" font-size="9" font-weight="700" fill="{colors.text_primary}">LLM_ENGINE</text>
    <text x="0" y="23" font-size="6" fill="{colors.text_muted}">Latent Space Projection</text>
  </g>
</svg>
