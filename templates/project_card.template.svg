<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 388 68" width="100%" height="100%" aria-label="Project Specification Card">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="{colors.bg_start}" />
      <stop offset="100%" stop-color="{colors.bg_end}" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .font-sans {
      font-family: {typography.font_family};
    }
  </style>

  <!-- Card background -->
  <rect width="388" height="68" fill="{colors.card_bg}" stroke="{colors.border}" stroke-width="1.2" rx="6" />
  
  <g class="font-sans">
    <text x="16" y="22" font-size="13" font-weight="700" fill="{colors.text_primary}">{project.title}</text>
    <text x="16" y="38" font-size="9" fill="{colors.text_muted}">{project.subtitle}</text>
    
    <!-- Tech specs -->
    <text x="16" y="52" font-size="9.5" fill="{colors.accent}" font-weight="600">Arch: {project.architecture}</text>
    <text x="210" y="52" font-size="9.5" fill="{project.accent_color}" font-weight="600">AI: {project.ai_integration}</text>
    <text x="270" y="52" font-size="9.5" fill="{colors.yellow}" font-weight="600">Diff: ★★★★★</text>
    <text x="372" y="24" font-size="9" font-weight="700" fill="{project.accent_color}" text-anchor="end">● {project.status}</text>
  </g>
</svg>
