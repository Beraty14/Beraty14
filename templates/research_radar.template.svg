<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%" aria-label="Research Metrics Module">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="{colors.bg_start}" />
      <stop offset="100%" stop-color="{colors.bg_end}" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .font-sans {{
      font-family: {typography.font_family};
    }}
  </style>

  <!-- Container -->
  <rect width="800" height="200" fill="url(#bgGrad)" stroke="{colors.border}" stroke-width="1.5" rx="8" />

  <!-- Section Header -->
  <g class="font-sans" transform="translate(24, 28)">
    <circle cx="6" cy="-4" r="4" fill="{colors.accent}" filter="url(#glow)" />
    <text x="18" y="0" font-size="10" font-weight="700" fill="{colors.text_muted}" letter-spacing="2">CORE RESEARCH &amp; ANALYSIS QUANTIFIER</text>
    <line x1="-8" y1="12" x2="760" y2="12" stroke="{colors.border}" stroke-width="1" />
  </g>

  <!-- Content Split Grid -->
  <g class="font-sans" transform="translate(24, 60)">
    
    <!-- Left Column: Skill Matrix -->
    <g transform="translate(0, 0)">
      <text x="0" y="10" font-size="10" font-weight="700" fill="{colors.text_muted}" letter-spacing="1">RESEARCH DOMAINS</text>
      
      <!-- Domain 1: AI -->
      <g transform="translate(0, 24)">
        <text x="0" y="8" font-size="11" font-weight="600" fill="{colors.text_primary}">AI Systems</text>
        <rect x="120" y="0" width="200" height="8" fill="{colors.card_bg}" stroke="{colors.border}" stroke-width="1" rx="4" />
        <rect x="120" y="0" width="200" height="8" fill="{colors.accent}" rx="4" filter="url(#glow)" />
        <text x="330" y="8" font-size="10" fill="{colors.accent}" font-weight="700">100%</text>
      </g>

      <!-- Domain 2: ML -->
      <g transform="translate(0, 44)">
        <text x="0" y="8" font-size="11" font-weight="600" fill="{colors.text_primary}">Machine Learning</text>
        <rect x="120" y="0" width="200" height="8" fill="{colors.card_bg}" stroke="{colors.border}" stroke-width="1" rx="4" />
        <rect x="120" y="0" width="180" height="8" fill="{colors.accent}" rx="4" />
        <text x="330" y="8" font-size="10" fill="{colors.accent}" font-weight="700">90%</text>
      </g>

      <!-- Domain 3: Bioinformatics -->
      <g transform="translate(0, 64)">
        <text x="0" y="8" font-size="11" font-weight="600" fill="{colors.text_primary}">Bioinformatics</text>
        <rect x="120" y="0" width="200" height="8" fill="{colors.card_bg}" stroke="{colors.border}" stroke-width="1" rx="4" />
        <rect x="120" y="0" width="170" height="8" fill="{colors.accent}" rx="4" />
        <text x="330" y="8" font-size="10" fill="{colors.accent}" font-weight="700">85%</text>
      </g>

      <!-- Domain 4: Algorithms -->
      <g transform="translate(0, 84)">
        <text x="0" y="8" font-size="11" font-weight="600" fill="{colors.text_primary}">Algorithms</text>
        <rect x="120" y="0" width="200" height="8" fill="{colors.card_bg}" stroke="{colors.border}" stroke-width="1" rx="4" />
        <rect x="120" y="0" width="190" height="8" fill="{colors.accent}" rx="4" />
        <text x="330" y="8" font-size="10" fill="{colors.accent}" font-weight="700">95%</text>
      </g>
    </g>

    <!-- Right Column: Scientific Counter Metrics -->
    <g transform="translate(420, 0)">
      <text x="0" y="10" font-size="10" font-weight="700" fill="{colors.text_muted}" letter-spacing="1">RESEARCH METRICS</text>

      <g transform="translate(0, 24)">
        <!-- Box 1: Experiments -->
        <g>
          <rect width="160" height="42" fill="{colors.card_bg}" stroke="{colors.border}" stroke-width="1.2" rx="4" />
          <text x="16" y="24" font-size="18" font-weight="800" fill="{colors.text_primary}">{research.counters.Experiments}</text>
          <text x="16" y="34" font-size="8" font-weight="700" fill="{colors.text_muted}" letter-spacing="0.5">RUN EXPERIMENTS</text>
        </g>
        
        <!-- Box 2: Models -->
        <g transform="translate(180, 0)">
          <rect width="160" height="42" fill="{colors.card_bg}" stroke="{colors.border}" stroke-width="1.2" rx="4" />
          <text x="16" y="24" font-size="18" font-weight="800" fill="{colors.text_primary}">{research.counters.Models}</text>
          <text x="16" y="34" font-size="8" font-weight="700" fill="{colors.text_muted}" letter-spacing="0.5">DEPLOYED MODELS</text>
        </g>

        <!-- Box 3: Datasets -->
        <g transform="translate(0, 54)">
          <rect width="160" height="42" fill="{colors.card_bg}" stroke="{colors.border}" stroke-width="1.2" rx="4" />
          <text x="16" y="24" font-size="18" font-weight="800" fill="{colors.text_primary}">{research.counters.Datasets}</text>
          <text x="16" y="34" font-size="8" font-weight="700" fill="{colors.text_muted}" letter-spacing="0.5">CURATED DATASETS</text>
        </g>

        <!-- Box 4: Academic Projects -->
        <g transform="translate(180, 54)">
          <rect width="160" height="42" fill="{colors.card_bg}" stroke="{colors.border}" stroke-width="1.2" rx="4" />
          <text x="16" y="24" font-size="18" font-weight="800" fill="{colors.text_primary}">{research.counters.Projects}</text>
          <text x="16" y="34" font-size="8" font-weight="700" fill="{colors.text_muted}" letter-spacing="0.5">RESEARCH WORKSPACE</text>
        </g>
      </g>
    </g>
  </g>
</svg>
