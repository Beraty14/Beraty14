<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" width="100%" height="100%" aria-label="Identity System Terminal">
  <defs>
    <!-- Dark gradient for premium chassis look -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="{colors.bg_start}" />
      <stop offset="100%" stop-color="{colors.bg_end}" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .font-mono {
      font-family: 'Courier New', Courier, monospace, system-ui;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }
    @keyframes sweep {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .grid-line {
      stroke: {colors.border};
      stroke-width: 0.5;
      stroke-dasharray: 2, 8;
    }
    .sweep-line {
      transform-origin: 70px 80px;
      animation: sweep 8s infinite linear;
    }
  </style>

  <!-- Chassis Background -->
  <rect width="800" height="160" fill="url(#bgGrad)" stroke="{colors.border}" stroke-width="1.5" rx="8" />

  <!-- CAD Backing Grid lines -->
  <line x1="140" y1="0" x2="140" y2="160" class="grid-line" />
  <line x1="500" y1="0" x2="500" y2="160" class="grid-line" />
  <line x1="0" y1="80" x2="800" y2="80" class="grid-line" />

  <!-- 1. RADAR MONITOR MODULE (Left) -->
  <g transform="translate(0, 0)">
    <!-- Radar base circles -->
    <circle cx="70" cy="80" r="48" fill="none" stroke="{colors.border}" stroke-width="1" />
    <circle cx="70" cy="80" r="32" fill="none" stroke="{colors.border}" stroke-width="0.8" stroke-dasharray="2, 2" />
    <circle cx="70" cy="80" r="16" fill="none" stroke="{colors.border}" stroke-width="0.5" />
    
    <!-- Crosshairs -->
    <line x1="70" y1="20" x2="70" y2="140" stroke="{colors.border}" stroke-width="0.5" stroke-dasharray="4, 4" />
    <line x1="10" y1="80" x2="130" y2="80" stroke="{colors.border}" stroke-width="0.5" stroke-dasharray="4, 4" />
    
    <!-- Radar sweep line -->
    <line x1="70" y1="80" x2="70" y2="32" stroke="{colors.accent}" stroke-width="1.5" class="sweep-line" opacity="0.6" filter="url(#glow)" />
    
    <!-- Blip targets -->
    <circle cx="90" cy="60" r="3" fill="{colors.green}" opacity="0.8" filter="url(#glow)" />
    <circle cx="50" cy="100" r="2.5" fill="{colors.accent}" opacity="0.6" />
    
    <!-- Label -->
    <text x="70" y="142" font-size="7" font-weight="700" fill="{colors.text_muted}" text-anchor="middle" class="font-mono">COGNITIVE_SCAN</text>
  </g>

  <!-- 2. SYSTEM CONSOLE DETAIL (Center) -->
  <g class="font-mono" transform="translate(160, 24)">
    <!-- Header info -->
    <text x="0" y="8" font-size="9" fill="{colors.accent}" font-weight="700">PROFILE TERMINAL // KERNEL v2.6.0</text>
    <line x1="0" y1="16" x2="310" y2="16" stroke="{colors.border}" stroke-width="1" />

    <!-- Console Data Fields -->
    <g transform="translate(0, 36)" font-size="10" font-weight="600">
      <text x="0" y="0" fill="{colors.text_muted}">SYS_NAME :</text>
      <text x="90" y="0" fill="{colors.text_primary}">{profile.name}</text>

      <text x="0" y="18" fill="{colors.text_muted}">SYS_ROLE :</text>
      <text x="90" y="18" fill="{colors.accent}">{profile.role}</text>

      <text x="0" y="36" fill="{colors.text_muted}">DIVISION :</text>
      <text x="90" y="36" fill="{colors.text_primary}">{profile.organization}</text>

      <text x="0" y="54" fill="{colors.text_muted}">DEPT_ID  :</text>
      <text x="90" y="54" fill="{colors.text_muted}">{profile.department}</text>
    </g>

  </g>

  <!-- 3. HARDWARE GAUGE MATRIX (Right) -->
  <g class="font-mono" transform="translate(520, 24)">
    <text x="0" y="8" font-size="9" fill="{colors.accent}" font-weight="700">CORE FOCUS RATINGS</text>
    <line x1="0" y1="16" x2="256" y2="16" stroke="{colors.border}" stroke-width="1" />

    <!-- Hardware Gauges -->
    <g transform="translate(0, 36)" font-size="9" font-weight="700">
      <!-- Gauge 1: Machine Learning -->
      <g>
        <text x="0" y="0" fill="{colors.text_primary}">ML/DL SYSTEMS</text>
        <text x="256" y="0" fill="{colors.accent}" text-anchor="end">95%</text>
        <!-- Bar ticks -->
        <g transform="translate(0, 6)" fill="{colors.accent}">
          <rect x="0" y="0" width="16" height="4" />
          <rect x="20" y="0" width="16" height="4" />
          <rect x="40" y="0" width="16" height="4" />
          <rect x="60" y="0" width="16" height="4" />
          <rect x="80" y="0" width="16" height="4" />
          <rect x="100" y="0" width="16" height="4" />
          <rect x="120" y="0" width="16" height="4" />
          <rect x="140" y="0" width="16" height="4" />
          <rect x="160" y="0" width="16" height="4" />
          <rect x="180" y="0" width="16" height="4" />
          <rect x="200" y="0" width="16" height="4" />
          <rect x="220" y="0" width="16" height="4" opacity="0.2" />
          <rect x="240" y="0" width="16" height="4" opacity="0.2" />
        </g>
      </g>

      <!-- Gauge 2: Bioinformatics -->
      <g transform="translate(0, 26)">
        <text x="0" y="0" fill="{colors.text_primary}">BIOINFORMATICS</text>
        <text x="256" y="0" fill="{colors.green}" text-anchor="end">85%</text>
        <g transform="translate(0, 6)" fill="{colors.green}">
          <rect x="0" y="0" width="16" height="4" />
          <rect x="20" y="0" width="16" height="4" />
          <rect x="40" y="0" width="16" height="4" />
          <rect x="60" y="0" width="16" height="4" />
          <rect x="80" y="0" width="16" height="4" />
          <rect x="100" y="0" width="16" height="4" />
          <rect x="120" y="0" width="16" height="4" />
          <rect x="140" y="0" width="16" height="4" />
          <rect x="160" y="0" width="16" height="4" />
          <rect x="180" y="0" width="16" height="4" />
          <rect x="200" y="0" width="16" height="4" opacity="0.2" />
          <rect x="220" y="0" width="16" height="4" opacity="0.2" />
          <rect x="240" y="0" width="16" height="4" opacity="0.2" />
        </g>
      </g>

      <!-- Gauge 3: System Architecture -->
      <g transform="translate(0, 52)">
        <text x="0" y="0" fill="{colors.text_primary}">SYS ARCHITECTURE</text>
        <text x="256" y="0" fill="{colors.accent}" text-anchor="end">90%</text>
        <g transform="translate(0, 6)" fill="{colors.accent}">
          <rect x="0" y="0" width="16" height="4" />
          <rect x="20" y="0" width="16" height="4" />
          <rect x="40" y="0" width="16" height="4" />
          <rect x="60" y="0" width="16" height="4" />
          <rect x="80" y="0" width="16" height="4" />
          <rect x="100" y="0" width="16" height="4" />
          <rect x="120" y="0" width="16" height="4" />
          <rect x="140" y="0" width="16" height="4" />
          <rect x="160" y="0" width="16" height="4" />
          <rect x="180" y="0" width="16" height="4" />
          <rect x="200" y="0" width="16" height="4" />
          <rect x="220" y="0" width="16" height="4" />
          <rect x="240" y="0" width="16" height="4" opacity="0.2" />
        </g>
      </g>
    </g>
  </g>
</svg>
