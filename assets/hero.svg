<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="100%" aria-label="AI Engineer OS Boot Screen">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070F18" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    
    <!-- Cyber Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#212936" stroke-width="0.7" opacity="0.4" />
    </pattern>
    
    <!-- Glow Effect Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .font-sans {{
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }}
    .text-glow {{
      filter: url(#glow);
    }}
    
    /* Animations */
    @keyframes pulse {{
      0%, 100% {{ opacity: 0.25; transform: scale(1); }}
      50% {{ opacity: 0.7; transform: scale(1.03); }}
    }}
    @keyframes float {{
      0%, 100% {{ transform: translateY(0px); }}
      50% {{ transform: translateY(-4px); }}
    }}
    @keyframes drawGrid {{
      0% {{ stroke-dashoffset: 800; }}
      100% {{ stroke-dashoffset: 0; }}
    }}
    @keyframes typing {{
      from {{ width: 0; }}
      to {{ width: 100%; }}
    }}
    @keyframes blink {{
      50% {{ opacity: 0; }}
    }}
    @keyframes loadingBar {{
      0% {{ width: 0%; }}
      100% {{ width: 100%; }}
    }}

    .pulse-node {{
      animation: pulse 4s infinite ease-in-out;
      transform-origin: center;
    }}
    .float-group {{
      animation: float 6s infinite ease-in-out;
    }}
    .cursor {{
      animation: blink 0.9s infinite;
    }}
    .loading-progress {{
      animation: loadingBar 3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }}
  </style>

  <!-- Background -->
  <rect width="800" height="240" fill="url(#bgGrad)" rx="8" />
  <rect width="800" height="240" fill="url(#grid)" rx="8" />

  <!-- Neon Glowing Core Overlay -->
  <circle cx="400" cy="120" r="140" fill="#38BDF8" opacity="0.03" filter="url(#glow)" />

  <!-- Animated Neural Net Connections -->
  <g stroke="#38BDF8" stroke-width="0.8" opacity="0.25">
    <!-- Synaptic Connection Lines -->
    <line x1="80" y1="60" x2="220" y2="40" />
    <line x1="220" y1="40" x2="340" y2="90" />
    <line x1="80" y1="180" x2="220" y2="200" />
    <line x1="220" y1="200" x2="340" y2="150" />
    
    <line x1="720" y1="60" x2="580" y2="40" />
    <line x1="580" y1="40" x2="460" y2="90" />
    <line x1="720" y1="180" x2="580" y2="200" />
    <line x1="580" y1="200" x2="460" y2="150" />

    <line x1="340" y1="90" x2="460" y2="90" />
    <line x1="340" y1="150" x2="460" y2="150" />
  </g>

  <!-- Synapse Nodes -->
  <g fill="#38BDF8">
    <circle cx="80" cy="60" r="4" class="pulse-node" style="animation-delay: 0s" />
    <circle cx="220" cy="40" r="3" class="pulse-node" style="animation-delay: 1s" />
    <circle cx="340" cy="90" r="5" class="pulse-node" style="animation-delay: 2s" />
    <circle cx="80" cy="180" r="3.5" class="pulse-node" style="animation-delay: 0.5s" />
    <circle cx="220" cy="200" r="4" class="pulse-node" style="animation-delay: 1.5s" />
    <circle cx="340" cy="150" r="4.5" class="pulse-node" style="animation-delay: 2.5s" />

    <circle cx="720" cy="60" r="4" class="pulse-node" style="animation-delay: 0.2s" />
    <circle cx="580" cy="40" r="3" class="pulse-node" style="animation-delay: 1.2s" />
    <circle cx="460" cy="90" r="5" class="pulse-node" style="animation-delay: 2.2s" />
    <circle cx="720" cy="180" r="3.5" class="pulse-node" style="animation-delay: 0.7s" />
    <circle cx="580" cy="200" r="4" class="pulse-node" style="animation-delay: 1.7s" />
    <circle cx="460" cy="150" r="4.5" class="pulse-node" style="animation-delay: 2.7s" />
  </g>

  <!-- Main Title and Subtitle -->
  <g class="font-sans float-group" text-anchor="middle">
    <!-- Pulsing Operating System Label -->
    <text x="400" y="70" font-size="11" letter-spacing="4" fill="#38BDF8" font-weight="700" opacity="0.8">SYSTEM INTERFACE</text>
    
    <!-- Primary Heading -->
    <text x="400" y="115" font-size="36" font-weight="800" fill="#F8FAFC" letter-spacing="6" class="text-glow">Berat Yurtsever</text>
    
    <!-- Secondary Role Description -->
    <text x="400" y="145" font-size="14" fill="#8F9CAE" letter-spacing="2">ARTIFICIAL INTELLIGENCE &amp; SYSTEMS ENGINEER</text>
  </g>

  <!-- Loading Indicator Box at Bottom -->
  <g class="font-sans" transform="translate(250, 180)">
    <!-- Loading Label -->
    <text x="0" y="10" font-size="10" font-weight="700" fill="#38BDF8" letter-spacing="1">INITIALIZING COGNITIVE KERNEL</text>
    <text x="300" y="10" font-size="10" font-weight="700" fill="#38BDF8" text-anchor="end">v2.6</text>
    
    <!-- Progress Bar Container -->
    <rect x="0" y="18" width="300" height="4" fill="#151B26" stroke="#212936" stroke-width="1" rx="2" />
    
    <!-- Moving Progress -->
    <rect x="0" y="18" height="4" fill="#38BDF8" rx="2" class="loading-progress" filter="url(#glow)" />
  </g>
</svg>
