<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" width="100%" height="100%" aria-label="Identity Module">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070F18" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .font-sans {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }
    .text-glow {
      filter: url(#glow);
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    .status-dot {
      animation: pulse 2s infinite ease-in-out;
    }
  </style>

  <!-- Container -->
  <rect width="800" height="160" fill="url(#bgGrad)" stroke="#212936" stroke-width="1.5" rx="8" />

  <!-- Section Header -->
  <g class="font-sans" transform="translate(24, 28)">
    <circle cx="6" cy="-4" r="4" fill="#10B981" class="status-dot" filter="url(#glow)" />
    <text x="18" y="0" font-size="10" font-weight="700" fill="#8F9CAE" letter-spacing="2">01 / IDENTITY KERNEL</text>
    <text x="752" y="0" font-size="10" font-weight="700" fill="#38BDF8" text-anchor="end">STATUS: ACTIVE</text>
    <line x1="-8" y1="12" x2="760" y2="12" stroke="#212936" stroke-width="1" />
  </g>

  <!-- Content Grid -->
  <g class="font-sans" transform="translate(24, 68)">
    <!-- Column 1: Core Details -->
    <g>
      <text x="0" y="0" font-size="11" fill="#8F9CAE" letter-spacing="1">ENGINEER</text>
      <text x="0" y="20" font-size="16" font-weight="700" fill="#F8FAFC">Berat Yurtsever</text>

      <text x="180" y="0" font-size="11" fill="#8F9CAE" letter-spacing="1">DEPT / ROLE</text>
      <text x="180" y="20" font-size="14" font-weight="600" fill="#F8FAFC">AI Engineer</text>
      <text x="180" y="36" font-size="11" fill="#8F9CAE">Artificial Intelligence & Machine Learning</text>
    </g>

    <!-- Column 2: System Focus -->
    <g transform="translate(420, 0)">
      <text x="0" y="0" font-size="11" fill="#8F9CAE" letter-spacing="1">RESEARCH FOCUS</text>
      <!-- Draw focus pill items -->
      <g transform="translate(0, 10)">
        <rect x="0" y="0" width="110" height="20" fill="#151B26" stroke="#212936" stroke-width="1" rx="4" />
        <text x="55" y="14" font-size="9" font-weight="600" fill="#38BDF8" text-anchor="middle">MACHINE LEARNING</text>

        <rect x="120" y="0" width="110" height="20" fill="#151B26" stroke="#212936" stroke-width="1" rx="4" />
        <text x="175" y="14" font-size="9" font-weight="600" fill="#38BDF8" text-anchor="middle">BIOINFORMATICS</text>

        <rect x="0" y="26" width="130" height="20" fill="#151B26" stroke="#212936" stroke-width="1" rx="4" />
        <text x="65" y="40" font-size="9" font-weight="600" fill="#38BDF8" text-anchor="middle">SYSTEM ARCHITECTURE</text>
      </g>
    </g>
  </g>
</svg>
