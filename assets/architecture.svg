<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="100%" aria-label="System Architecture Flowchart">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070F18" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .font-sans {{
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }}
    
    /* Flowing Animation along connectors */
    @keyframes dashflow {{
      to {{
        stroke-dashoffset: -20;
      }}
    }}
    .flow-line {{
      stroke-dasharray: 6, 6;
      animation: dashflow 1.5s infinite linear;
    }}
    
    @keyframes pulseNode {{
      0%, 100% {{ r: 6; fill-opacity: 0.3; }}
      50% {{ r: 10; fill-opacity: 0.7; }}
    }}
    .pulse-ring {{
      animation: pulseNode 3s infinite ease-in-out;
    }}
  </style>

  <!-- Container -->
  <rect width="800" height="240" fill="url(#bgGrad)" stroke="#212936" stroke-width="1.5" rx="8" />

  <!-- Section Header -->
  <g class="font-sans" transform="translate(24, 28)">
    <circle cx="6" cy="-4" r="4" fill="#38BDF8" filter="url(#glow)" />
    <text x="18" y="0" font-size="10" font-weight="700" fill="#8F9CAE" letter-spacing="2">03 / ACTIVE SYSTEM PIPELINE ARCHITECTURE</text>
    <line x1="-8" y1="12" x2="760" y2="12" stroke="#212936" stroke-width="1" />
  </g>

  <!-- Node Elements Layout -->
  <g class="font-sans" transform="translate(0, 40)">
    
    <!-- Flow Connector Lines -->
    <path d="M 90 90 L 210 90" fill="none" stroke="#212936" stroke-width="2" />
    <path d="M 90 90 L 210 90" fill="none" stroke="#38BDF8" stroke-width="2" class="flow-line" />

    <!-- Split from Frontend to APIs -->
    <path d="M 310 90 L 430 50" fill="none" stroke="#212936" stroke-width="2" />
    <path d="M 310 90 L 430 50" fill="none" stroke="#38BDF8" stroke-width="2" class="flow-line" />
    
    <path d="M 310 90 L 430 130" fill="none" stroke="#212936" stroke-width="2" />
    <path d="M 310 90 L 430 130" fill="none" stroke="#38BDF8" stroke-width="2" class="flow-line" />

    <!-- Connectors from APIs to Engines -->
    <path d="M 530 50 L 650 90" fill="none" stroke="#212936" stroke-width="2" />
    <path d="M 530 50 L 650 90" fill="none" stroke="#38BDF8" stroke-width="2" class="flow-line" />
    
    <path d="M 530 130 L 650 90" fill="none" stroke="#212936" stroke-width="2" />
    <path d="M 530 130 L 650 90" fill="none" stroke="#38BDF8" stroke-width="2" class="flow-line" />

    <!-- Node 1: Client/User -->
    <g transform="translate(90, 90)">
      <circle cx="0" cy="0" r="28" fill="#151B26" stroke="#212936" stroke-width="1.5" />
      <text x="0" y="4" font-size="10" font-weight="700" fill="#F8FAFC" text-anchor="middle">USERS</text>
    </g>

    <!-- Node 2: Frontend Layer (React/Next) -->
    <g transform="translate(260, 90)">
      <circle cx="0" cy="0" r="32" fill="#151B26" stroke="#212936" stroke-width="1.5" />
      <text x="0" y="-2" font-size="10" font-weight="700" fill="#F8FAFC" text-anchor="middle">FRONTEND</text>
      <text x="0" y="10" font-size="8" fill="#8F9CAE" text-anchor="middle">React / Next</text>
    </g>

    <!-- Node 3: FastAPI Backend -->
    <g transform="translate(480, 50)">
      <circle cx="0" cy="0" r="30" fill="#151B26" stroke="#212936" stroke-width="1.5" />
      <text x="0" y="-2" font-size="10" font-weight="700" fill="#F8FAFC" text-anchor="middle">BACKEND</text>
      <text x="0" y="10" font-size="8" fill="#8F9CAE" text-anchor="middle">FastAPI</text>
    </g>

    <!-- Node 4: ML Inference Layer -->
    <g transform="translate(480, 130)">
      <circle cx="0" cy="0" r="30" fill="#151B26" stroke="#212936" stroke-width="1.5" />
      <text x="0" y="-2" font-size="9" font-weight="700" fill="#F8FAFC" text-anchor="middle">INFERENCE</text>
      <text x="0" y="10" font-size="8" fill="#8F9CAE" text-anchor="middle">PyTorch</text>
    </g>

    <!-- Node 5: Storage & Vector DB -->
    <g transform="translate(680, 90)">
      <!-- Pulsing Node Ring -->
      <circle cx="0" cy="0" r="6" fill="#38BDF8" class="pulse-ring" filter="url(#glow)" />
      
      <circle cx="0" cy="0" r="32" fill="#151B26" stroke="#38BDF8" stroke-width="1.5" filter="url(#glow)" />
      <text x="0" y="-2" font-size="9" font-weight="700" fill="#38BDF8" text-anchor="middle">KNOWLEDGE</text>
      <text x="0" y="10" font-size="7.5" fill="#F8FAFC" text-anchor="middle">Postgres / Vector</text>
    </g>

  </g>
</svg>
