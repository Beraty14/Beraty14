<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="100%" height="100%" aria-label="Systems Radial Architecture Constellation">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070F18" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .font-mono {
      font-family: 'Courier New', Courier, monospace, system-ui;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }
    @keyframes rotateCore {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .pulse-node {
      animation: pulse 3s infinite ease-in-out;
    }
    .core-ring {
      transform-origin: 400px 130px;
      animation: rotateCore 12s infinite linear;
    }
    .grid-line {
      stroke: #212936;
      stroke-width: 0.5;
      stroke-dasharray: 2, 8;
    }
  </style>

  <!-- Chassis Background -->
  <rect width="800" height="260" fill="url(#bgGrad)" stroke="#212936" stroke-width="1.5" rx="8" />

  <!-- Technical grid backing -->
  <line x1="400" y1="0" x2="400" y2="260" class="grid-line" />
  <line x1="0" y1="130" x2="800" y2="130" class="grid-line" />
  <circle cx="400" cy="130" r="100" fill="none" stroke="#212936" stroke-width="0.5" stroke-dasharray="4, 12" />
  <circle cx="400" cy="130" r="160" fill="none" stroke="#212936" stroke-width="0.5" stroke-dasharray="4, 12" />

  <!-- Section Header -->
  <g class="font-mono" transform="translate(24, 28)">
    <circle cx="6" cy="-4" r="4" fill="#38BDF8" filter="url(#glow)" />
    <text x="18" y="0" font-size="10" font-weight="700" fill="#8F9CAE" letter-spacing="2">03 / ACTIVE SYSTEMS &amp; COGNITIVE PIPELINE</text>
    <line x1="-8" y1="12" x2="760" y2="12" stroke="#212936" stroke-width="1" />
  </g>

  <!-- Circuit Connector Lines (Hexagonal Constellation) -->
  <g stroke="#212936" stroke-width="1" fill="none" opacity="0.6">
    <line x1="200" y1="70" x2="400" y2="130" />
    <line x1="200" y1="190" x2="400" y2="130" />
    
    <line x1="400" y1="40" x2="400" y2="130" />
    <line x1="400" y1="220" x2="400" y2="130" />
    
    <line x1="600" y1="70" x2="400" y2="130" />
    <line x1="600" y1="190" x2="400" y2="130" />
  </g>

  <!-- Flowing data packets (animated circles along paths) -->
  <g fill="none">
    <circle r="3" fill="#38BDF8" filter="url(#glow)">
      <animateMotion dur="2s" repeatCount="indefinite" path="M 200 70 L 400 130" />
    </circle>
    <circle r="2.5" fill="#10B981">
      <animateMotion dur="2.5s" repeatCount="indefinite" path="M 200 190 L 400 130" />
    </circle>
    <circle r="3" fill="#38BDF8" filter="url(#glow)">
      <animateMotion dur="1.8s" repeatCount="indefinite" path="M 400 130 L 600 70" />
    </circle>
    <circle r="2.5" fill="#10B981">
      <animateMotion dur="2.2s" repeatCount="indefinite" path="M 400 130 L 600 190" />
    </circle>
  </g>

  <!-- 1. CENTRAL PROCESSING CORE (ML Engine) -->
  <g transform="translate(0, 0)">
    <!-- Concentric core target -->
    <circle cx="400" cy="130" r="28" fill="#151B26" stroke="#38BDF8" stroke-width="1.2" />
    <circle cx="400" cy="130" r="22" fill="none" stroke="#38BDF8" stroke-width="0.8" stroke-dasharray="3, 3" class="core-ring" />
    <circle cx="400" cy="130" r="6" fill="#38BDF8" filter="url(#glow)" class="pulse-node" />
    
    <!-- Central status label -->
    <g class="font-mono" font-size="7" font-weight="700" text-anchor="middle" fill="#F8FAFC">
      <text x="400" y="86">COGNITIVE CORE</text>
      <text x="400" y="184" fill="#38BDF8">CUDA COMPUTE</text>
    </g>
  </g>

  <!-- 2. SATELLITE NODES -->
  
  <!-- Node A: Ingest Bio (Left Top) -->
  <g transform="translate(200, 70)" class="font-mono" text-anchor="end">
    <circle cx="0" cy="0" r="5" fill="#38BDF8" filter="url(#glow)" />
    <text x="-12" y="3" font-size="9" font-weight="700" fill="#F8FAFC">INGEST_BIO</text>
    <text x="-12" y="11" font-size="6" fill="#8F9CAE">FASTA Seq Data</text>
  </g>

  <!-- Node B: Ingest RAG (Left Bottom) -->
  <g transform="translate(200, 190)" class="font-mono" text-anchor="end">
    <circle cx="0" cy="0" r="5" fill="#10B981" />
    <text x="-12" y="3" font-size="9" font-weight="700" fill="#F8FAFC">INGEST_RAG</text>
    <text x="-12" y="11" font-size="6" fill="#8F9CAE">Search Log Streams</text>
  </g>

  <!-- Node C: PyTorch Core (Center Top) -->
  <g transform="translate(400, 40)" class="font-mono" text-anchor="middle">
    <circle cx="0" cy="0" r="5" fill="#38BDF8" />
    <text x="0" y="-10" font-size="9" font-weight="700" fill="#38BDF8">PYTORCH_ML</text>
    <text x="0" y="-18" font-size="6" fill="#8F9CAE">Transformer Inference</text>
  </g>

  <!-- Node D: PGVector DB (Right Top) -->
  <g transform="translate(600, 70)" class="font-mono" text-anchor="start">
    <circle cx="0" cy="0" r="5" fill="#38BDF8" filter="url(#glow)" />
    <text x="12" y="3" font-size="9" font-weight="700" fill="#F8FAFC">PGVECTOR_DB</text>
    <text x="12" y="11" font-size="6" fill="#8F9CAE">Embeddings Vector Store</text>
  </g>

  <!-- Node E: REST Gateway (Right Bottom) -->
  <g transform="translate(600, 190)" class="font-mono" text-anchor="start">
    <circle cx="0" cy="0" r="5" fill="#10B981" />
    <text x="12" y="3" font-size="9" font-weight="700" fill="#F8FAFC">REST_GATEWAY</text>
    <text x="12" y="11" font-size="6" fill="#8F9CAE">JSON Serialization API</text>
  </g>

  <!-- Node F: LLM Inference (Center Bottom) -->
  <g transform="translate(400, 220)" class="font-mono" text-anchor="middle">
    <circle cx="0" cy="0" r="5" fill="#38BDF8" />
    <text x="0" y="15" font-size="9" font-weight="700" fill="#F8FAFC">LLM_ENGINE</text>
    <text x="0" y="23" font-size="6" fill="#8F9CAE">Latent Space Projection</text>
  </g>
</svg>
