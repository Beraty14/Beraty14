<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="100%" aria-label="Projects Specification Grid">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070F18" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .font-sans {{
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }}
  </style>

  <!-- Container -->
  <rect width="800" height="240" fill="url(#bgGrad)" stroke="#212936" stroke-width="1.5" rx="8" />

  <!-- Section Header -->
  <g class="font-sans" transform="translate(24, 28)">
    <circle cx="6" cy="-4" r="4" fill="#38BDF8" filter="url(#glow)" />
    <text x="18" y="0" font-size="10" font-weight="700" fill="#8F9CAE" letter-spacing="2">04 / DETAILED REPOSITORY ARTIFACTS</text>
    <line x1="-8" y1="12" x2="760" y2="12" stroke="#212936" stroke-width="1" />
  </g>

  <!-- 2x2 Grid of Projects -->
  <g class="font-sans" transform="translate(24, 56)">
    
    <!-- Row 1, Col 1: THE WILL -->
    <g transform="translate(0, 0)">
      <!-- Card background -->
      <rect width="364" height="68" fill="#151B26" stroke="#212936" stroke-width="1.2" rx="6" />
      <text x="16" y="22" font-size="13" font-weight="700" fill="#F8FAFC">THE WILL</text>
      <text x="16" y="38" font-size="9" fill="#8F9CAE">AAA Horror Game AI Engine</text>
      
      <!-- Tech specs -->
      <text x="16" y="52" font-size="9.5" fill="#38BDF8" font-weight="600">Engine: Unreal</text>
      <text x="120" y="52" font-size="9.5" fill="#EF4444" font-weight="600">AI: Yes</text>
      <text x="190" y="52" font-size="9.5" fill="#F59E0B" font-weight="600">Diff: ★★★★★</text>
      <text x="348" y="24" font-size="9" font-weight="700" fill="#EF4444" text-anchor="end">● ACTIVE</text>
    </g>

    <!-- Row 1, Col 2: ArcaneSpire -->
    <g transform="translate(388, 0)">
      <rect width="364" height="68" fill="#151B26" stroke="#212936" stroke-width="1.2" rx="6" />
      <text x="16" y="22" font-size="13" font-weight="700" fill="#F8FAFC">ArcaneSpire</text>
      <text x="16" y="38" font-size="9" fill="#8F9CAE">Java OOP Game Framework</text>
      
      <text x="16" y="52" font-size="9.5" fill="#38BDF8" font-weight="600">Engine: Java2D</text>
      <text x="120" y="52" font-size="9.5" fill="#8F9CAE" font-weight="600">AI: No</text>
      <text x="190" y="52" font-size="9.5" fill="#F59E0B" font-weight="600">Diff: ★★★★☆</text>
      <text x="348" y="24" font-size="9" font-weight="700" fill="#10B981" text-anchor="end">● STABLE</text>
    </g>

    <!-- Row 2, Col 1: AlgoritmalarProje -->
    <g transform="translate(0, 84)">
      <rect width="364" height="68" fill="#151B26" stroke="#212936" stroke-width="1.2" rx="6" />
      <text x="16" y="22" font-size="13" font-weight="700" fill="#F8FAFC">AlgoritmalarProje</text>
      <text x="16" y="38" font-size="9" fill="#8F9CAE">Multi-Disciplinary Algorithm Visualizer</text>
      
      <text x="16" y="52" font-size="9.5" fill="#38BDF8" font-weight="600">Engine: JavaScript</text>
      <text x="135" y="52" font-size="9.5" fill="#10B981" font-weight="600">AI: Yes</text>
      <text x="190" y="52" font-size="9.5" fill="#F59E0B" font-weight="600">Diff: ★★★★☆</text>
      <text x="348" y="24" font-size="9" font-weight="700" fill="#F59E0B" text-anchor="end">● TESTING</text>
    </g>

    <!-- Row 2, Col 2: astrobyte -->
    <g transform="translate(388, 84)">
      <rect width="364" height="68" fill="#151B26" stroke="#212936" stroke-width="1.2" rx="6" />
      <text x="16" y="22" font-size="13" font-weight="700" fill="#F8FAFC">astrobyte</text>
      <text x="16" y="38" font-size="9" fill="#8F9CAE">Lightweight JavaScript Framework</text>
      
      <text x="16" y="52" font-size="9.5" fill="#38BDF8" font-weight="600">Engine: Vanilla JS</text>
      <text x="135" y="52" font-size="9.5" fill="#8F9CAE" font-weight="600">AI: No</text>
      <text x="190" y="52" font-size="9.5" fill="#F59E0B" font-weight="600">Diff: ★★★☆☆</text>
      <text x="348" y="24" font-size="9" font-weight="700" fill="#38BDF8" text-anchor="end">● ACTIVE</text>
    </g>

  </g>
</svg>
