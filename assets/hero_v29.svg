<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="100%" aria-label="AI Engineer OS Boot Screen">
  <defs>
    <!-- Ultra-premium dark gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070F18" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    
    <!-- Clean Dot Grid Pattern -->
    <pattern id="dotGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#212936" opacity="0.3" />
    </pattern>

    <!-- Subtle accent glow -->
    <linearGradient id="accentGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0" />
      <stop offset="50%" stop-color="#38BDF8" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0" />
    </linearGradient>
  </defs>

  <style>
    .font-sans {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }
    .font-mono {
      font-family: 'Courier New', Courier, monospace, system-ui;
    }
    /* Clean subtle pulse for background elements, text remains static */
    @keyframes slowPulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.5; }
    }
    .bg-pulse {
      animation: slowPulse 6s infinite ease-in-out;
    }
  </style>

  <!-- Base Chassis -->
  <rect width="800" height="240" fill="url(#bgGrad)" rx="8" />
  <!-- Dot Grid Overlay -->
  <rect width="800" height="240" fill="url(#dotGrid)" rx="8" />

  <!-- Corner Technical Brackets -->
  <g stroke="#212936" stroke-width="1.5" fill="none" opacity="0.6">
    <!-- Top Left -->
    <path d="M 40 40 L 20 40 L 20 60" />
    <!-- Top Right -->
    <path d="M 760 40 L 780 40 L 780 60" />
    <!-- Bottom Left -->
    <path d="M 40 200 L 20 200 L 20 180" />
    <!-- Bottom Right -->
    <path d="M 760 200 L 780 200 L 780 180" />
  </g>

  <!-- Center Decorative Glow Line -->
  <rect x="250" y="50" width="300" height="1" fill="url(#accentGlow)" />

  <!-- Subtitle Tag above Name -->
  <g class="font-mono" transform="translate(400, 80)" text-anchor="middle">
    <text x="0" y="0" font-size="10" fill="#38BDF8" font-weight="700" letter-spacing="4">SYSTEM INTERFACE</text>
  </g>

  <!-- Main Name Title - Static, No Animation, Extremely Premium -->
  <g class="font-sans" transform="translate(400, 140)" text-anchor="middle">
    <text x="0" y="0" font-size="46" font-weight="800" fill="#F8FAFC" letter-spacing="8">Berat Yurtsever</text>
  </g>

  <!-- Role Description -->
  <g class="font-sans" transform="translate(400, 175)" text-anchor="middle">
    <text x="0" y="0" font-size="13" fill="#8F9CAE" font-weight="600" letter-spacing="3">ARTIFICIAL INTELLIGENCE &amp; SYSTEMS ENGINEER</text>
  </g>

  <!-- Center Decorative Glow Line -->
  <rect x="250" y="210" width="300" height="1" fill="url(#accentGlow)" opacity="0.5" />
  
  <!-- Tiny decorative crosshairs -->
  <g stroke="#38BDF8" stroke-width="1" opacity="0.5" class="bg-pulse">
    <line x1="400" y1="20" x2="400" y2="30" />
    <line x1="395" y1="25" x2="405" y2="25" />
  </g>
</svg>
